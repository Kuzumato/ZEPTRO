<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Zeptro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #11111a;
      --surface2: #1a1a28;
      --border: rgba(255,255,255,0.07);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent-glow: rgba(124, 58, 237, 0.25);
      --text: #f0f0f8;
      --muted: #8888aa;
      --danger: #ef4444;
      --success: #10b981;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .glow-1 {
      top: -100px; right: -100px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
    }

    .glow-2 {
      bottom: -100px; left: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
    }

    .main-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .signup-header {
      text-align: center;
      margin-bottom: 48px;
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .signup-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .signup-subtitle {
      font-size: 16px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .forms-row {
      display: flex;
      flex-direction: row;
      gap: 48px;
      justify-content: center;
      align-items: flex-start;
      max-width: 900px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 380px;
      max-width: 95vw;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      animation: slideUp 0.8s ease-out;
      transition: border-color 0.3s;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card h2 {
      font-family: 'Rajdhani', sans-serif;
      color: var(--accent2);
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
      text-align: center;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
      margin-top: 0;
      line-height: 1.6;
    }

    label {
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text);
      margin-top: 16px;
      letter-spacing: 1px;
      display: block;
    }

    input, select {
      width: 100%;
      font-size: 14px;
      padding: 10px 14px;
      margin-bottom: 2px;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all 0.2s;
      outline: none;
      box-sizing: border-box;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      background: rgba(124, 58, 237, 0.1);
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.2);
    }

    input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .checkbox-row {
      margin: 20px 0 0 0;
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .checkbox-row label {
      margin: 0;
      color: var(--muted);
      cursor: pointer;
    }

    .checkbox-row a {
      color: var(--accent2);
      text-decoration: none;
      transition: color 0.2s;
    }

    .checkbox-row a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .actions-row {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 0;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Barlow', sans-serif;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
    }

    .btn:hover {
      background: #6d28d9;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
      transform: translateY(-2px);
    }

    .login-link {
      text-align: center;
      margin-top: 8px;
      color: var(--accent2);
      text-decoration: none;
      font-size: 13px;
      display: block;
      width: 100%;
      transition: color 0.2s;
      letter-spacing: 1px;
    }

    .login-link:hover {
      color: var(--accent);
    }

    .error-message, .success-message {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      display: none;
      padding: 12px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .error-message { 
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .success-message { 
      color: var(--success);
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--accent2);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      z-index: 10;
    }

    .back-link:hover {
      color: var(--accent);
    }

    @media (max-width: 900px) {
      .forms-row { 
        flex-direction: column; 
        align-items: center; 
        gap: 24px;
      }
      .card { 
        width: 90vw; 
        max-width: 420px;
      }
      .signup-title {
        font-size: 36px;
      }
    }

    @media (max-width: 600px) {
      .main-wrapper {
        padding: 20px;
      }
      .signup-header {
        margin-bottom: 32px;
      }
      .signup-title {
        font-size: 28px;
      }
      .forms-row { 
        gap: 16px;
      }
      .card { 
        width: 100%;
        padding: 28px 20px;
      }
      .back-link {
        font-size: 11px;
      }
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const signupForm = document.getElementById('signup-form');
      const errorMsg = document.getElementById('form-error');
      const successMsg = document.getElementById('form-success');

      signupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        // KYC Section
        const fullName = signupForm.elements['fullName'].value.trim();
        const dob = signupForm.elements['dob'].value;
        const nationality = signupForm.elements['nationality'].value.trim();
        const idType = signupForm.elements['idType'].value;
        const idNumber = signupForm.elements['idNumber'].value.trim();
        const address = signupForm.elements['address'].value.trim();
        const kycEmail = signupForm.elements['kycEmail'].value.trim();
        const phone = signupForm.elements['phone'].value.trim();

        // Game Section
        const username = signupForm.elements['username'].value.trim();
        const gameEmail = signupForm.elements['gameEmail'].value.trim();
        const password = signupForm.elements['password'].value;
        const confirmPassword = signupForm.elements['confirmPassword'].value;
        const agree = signupForm.elements['agree'].checked;

        // Validation
        if (!fullName || !dob || !nationality || !idType || !idNumber || !address || !kycEmail || !phone ||
            !username || !gameEmail || !password || !confirmPassword) {
          errorMsg.textContent = 'Please fill in all required fields in both sections.';
          errorMsg.style.display = 'block'; return;
        }
        if (!/^[^@]+@[^@]+\.[^@]+$/.test(kycEmail) || !/^[^@]+@[^@]+\.[^@]+$/.test(gameEmail)) {
          errorMsg.textContent = 'Enter valid email addresses.';
          errorMsg.style.display = 'block'; return;
        }
        if (!/^[0-9]{10,15}$/.test(phone)) {
          errorMsg.textContent = 'Enter a valid phone number (10-15 digits).';
          errorMsg.style.display = 'block'; return;
        }
        if (!/^[A-Za-z0-9\- ]{5,}$/.test(idNumber)) {
          errorMsg.textContent = 'Enter a valid ID number.';
          errorMsg.style.display = 'block'; return;
        }
        if (password.length < 6) {
          errorMsg.textContent = 'Password must be at least 6 characters.';
          errorMsg.style.display = 'block'; return;
        }
        if (password !== confirmPassword) {
          errorMsg.textContent = 'Passwords do not match.';
          errorMsg.style.display = 'block'; return;
        }
        if (!agree) {
          errorMsg.textContent = 'You must agree to the Terms & Privacy Policy.';
          errorMsg.style.display = 'block'; return;
        }

        // Save (simulate)
        localStorage.setItem('kycCompleted', 'true');
        localStorage.setItem('kycName', fullName);
        localStorage.setItem('gameSignup', 'true');
        localStorage.setItem('gameUser', username);

        successMsg.textContent = 'Sign up and KYC completed! Redirecting...';
        successMsg.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1700);
      });
    });
  </script>
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <a href="index.html" class="back-link">← Back</a>

  <div class="main-wrapper">
    <div class="signup-header">
      <h1 class="signup-title">Join Zeptro</h1>
      <p class="signup-subtitle">◆ Create Your Gaming Account ◆</p>
    </div>

    <form id="signup-form" autocomplete="off">
      <div class="forms-row">
        <!-- KYC Sign Up -->
        <div class="card">
          <h2>KYC Sign Up</h2>
          <div class="subtitle">
            <b>Know Your Customer</b> verification ensures account security and compliance.
          </div>
          <label for="fullName">Full Name*</label>
          <input type="text" name="fullName" id="fullName" placeholder="Your full legal name" required>

          <label for="dob">Date of Birth*</label>
          <input type="date" name="dob" id="dob" required>

          <label for="nationality">Nationality*</label>
          <input type="text" name="nationality" id="nationality" placeholder="e.g. Indian, American" required>

          <label for="idType">ID Type*</label>
          <select name="idType" id="idType" required>
            <option value="">Select ID Type</option>
            <option value="passport">Passport</option>
            <option value="national_id">National ID Card</option>
            <option value="driver_license">Driver's License</option>
            <option value="voter_card">Voter Card</option>
            <option value="other">Other</option>
          </select>

          <label for="idNumber">ID Number*</label>
          <input type="text" name="idNumber" id="idNumber" placeholder="Enter your ID number" required>

          <label for="address">Residential Address*</label>
          <input type="text" name="address" id="address" placeholder="Full address" required>

          <label for="kycEmail">Email Address*</label>
          <input type="email" name="kycEmail" id="kycEmail" placeholder="your@email.com" required>

          <label for="phone">Phone Number*</label>
          <input type="text" name="phone" id="phone" placeholder="10-15 digits" required>
        </div>

        <!-- Game Sign Up -->
        <div class="card">
          <h2>Game Account</h2>
          <div class="subtitle">
            Choose your gaming username and password. Use a strong password!
          </div>
          <label for="username">Username*</label>
          <input type="text" name="username" id="username" placeholder="Your gaming username" required>

          <label for="gameEmail">Email Address*</label>
          <input type="email" name="gameEmail" id="gameEmail" placeholder="your@email.com" required>

          <label for="password">Password*</label>
          <input type="password" name="password" id="password" placeholder="Strong password" required>

          <label for="confirmPassword">Confirm Password*</label>
          <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm password" required>

          <div class="checkbox-row">
            <input type="checkbox" name="agree" id="agree" required>
            <label for="agree">
              I agree to the <a href="pages/legal/terms.html" target="_blank">Terms</a> & <a href="pages/legal/privacy.html" target="_blank">Privacy Policy</a>
            </label>
          </div>
        </div>
      </div>

      <div class="actions-row" style="max-width:380px;margin:32px auto 0 auto;">
        <button class="btn" type="submit">Sign Up Now</button>
        <a class="login-link" href="pages/auth/login/login.html">Already have an account? Login</a>
        <div class="success-message" id="form-success"></div>
        <div class="error-message" id="form-error"></div>
      </div>
    </form>
  </div>
</body>
</html>
