<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Zeptro</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #11111a;
      --surface2: #1a1a28;
      --border: rgba(255,255,255,0.07);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent-glow: rgba(124, 58, 237, 0.25);
      --text: #f0f0f8;
      --muted: #8888aa;
      --danger: #ef4444;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-glow {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .glow-1 {
      top: -150px; right: -150px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      animation: float 20s ease-in-out infinite;
    }

    .glow-2 {
      bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--accent2);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      z-index: 10;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-header {
      text-align: center;
      margin-bottom: 48px;
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      backdrop-filter: blur(12px);
      animation: slideUp 0.8s ease-out;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.1);
      transition: border-color 0.3s;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-container:hover {
      border-color: var(--accent);
    }

    .login-container h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 32px;
      text-align: center;
      letter-spacing: 2px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      border-color: var(--accent);
      background: rgba(124, 58, 237, 0.1);
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.2);
    }

    input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .remember-me input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--accent);
    }

    .remember-me label {
      margin: 0;
      color: var(--muted);
      cursor: pointer;
      text-transform: none;
      letter-spacing: normal;
    }

    .forgot-password {
      color: var(--accent2);
      text-decoration: none;
      transition: color 0.2s;
      font-size: 12px;
      letter-spacing: 0;
      text-transform: none;
    }

    .forgot-password:hover {
      color: var(--accent);
    }

    .login-container button[type="submit"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
      margin-bottom: 16px;
    }

    .login-container button[type="submit"]:hover {
      background: #6d28d9;
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
    }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .signup-link a {
      color: var(--accent2);
      text-decoration: none;
      transition: color 0.2s;
    }

    .signup-link a:hover {
      color: var(--accent);
    }

    .error-message {
      display: none;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 4px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .login-title {
        font-size: 32px;
      }

      .login-container {
        padding: 32px 24px;
      }

      .login-container h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <a href="../../../index.html" class="back-link">← Back to Home</a>

  <div class="login-wrapper">
    <div class="login-header">
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">◆ Login to Zeptro ◆</p>
    </div>

    <div class="login-container">
      <h2>Login</h2>
      <div class="error-message" id="error-msg"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input 
            id="username" 
            type="text" 
            placeholder="Enter your username or email" 
            required 
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            id="password" 
            type="password" 
            placeholder="Enter your password" 
            required 
          />
        </div>

        <div class="form-options">
          <div class="remember-me">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit">Login Now</button>

        <div class="signup-link">
          Don't have an account? <a href="../../../signup.html">Sign up here</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("loginForm");
      const errorMsg = document.getElementById("error-msg");

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        errorMsg.style.display = "none";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        // Demo credentials
        const validUsername = "admin";
        const validPassword = "12345";

        if (username === validUsername && password === validPassword) {
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('username', username);
          window.location.href = "dashboard/dashboard.html";
        } else {
          errorMsg.textContent = "Invalid username or password. Try admin / 12345";
          errorMsg.style.display = "block";
        }
      });
    });
  </script>
</body>
</html>
